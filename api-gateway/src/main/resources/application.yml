server:
  port: 8080

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service-auth-route
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/auth/**

            - id: auth-service-admin-route
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/admin/**

            - id: auth-service-test-route
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/test/**

            - id: workspace-service-route
              uri: lb://WORKSPACE-SERVICE
              predicates:
                - Path=/api/v1/workspaces/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - gateway

  endpoint:
    health:
      show-details: always

    gateway:
      access: read-only