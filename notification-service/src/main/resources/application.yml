server:
  port: 8087

spring:
  application:
    name: notification-service

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

    test-connection: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  health:
    mail:
      enabled: false

  endpoints:
    web:
      exposure:
        include: health,info